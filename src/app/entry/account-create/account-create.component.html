<div class="mt-20 flex justify-center items-center">
  <mat-card class="w-[600px] h-[800px]"
    ><h1 class="text-center">LOGIN</h1>
    <form [formGroup]="accountCreateForm" (ngSubmit)="submitForm()">
      <div class="flex flex-col">
        <mat-form-field>
          <mat-label>Name</mat-label>
          <input matInput formControlName="name" required />
        </mat-form-field>
        <mat-form-field>
          <mat-label>Email</mat-label>
          <input matInput formControlName="email" required type="email" />
        </mat-form-field>
        <mat-form-field>
          <mat-label>Username</mat-label>
          <input matInput formControlName="username" required />
        </mat-form-field>
        <mat-form-field>
          <mat-label>Password</mat-label>
          <input matInput formControlName="password" type="password" required />
        </mat-form-field>
        <mat-form-field>
          <mat-label>Type User</mat-label>
          <input matInput formControlName="typeUser" type="typeUser" required />
        </mat-form-field>
        <button
          data-testid="account-create"
          id="account-create"
          class="w-full"
          type="submit"
          matButton="filled"
          [disabled]="accountCreateForm.invalid"
        >
          ACCOUNT CREATE
        </button>
      </div>
    </form>
  </mat-card>
</div>
