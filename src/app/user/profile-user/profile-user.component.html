<div class="flex">
  <div class="h-full">
    <app-customer-profile
      [customerCurrent]="loggedCustomer"
      (menuSelected)="onMenuSelected($event)"
    />
  </div>

  <div class="border-container w-full">
    <ng-container [ngSwitch]="selectedMenu">
      <app-reservations *ngSwitchCase="'Booking'" />
      <app-admin *ngSwitchCase="'Gift Cards'" />
      <div *ngSwitchDefault></div>
    </ng-container>
  </div>
</div>
